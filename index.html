<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteirizador Inteligente - Pedro</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        textarea { height: 150px; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #94a3b8; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 14px; }
        .loading { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
        .success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        pre { white-space: pre-wrap; word-wrap: break-word; background: #f1f5f9; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Roteirizador Logístico</h1>
    
    <div class="form-group">
        <label>API Key do Manus:</label>
        <input type="password" id="apiKey" placeholder="Cole sua sk-8-...">
    </div>

    <div class="form-group">
        <label>Endereços (um por linha):</label>
        <textarea id="enderecos" placeholder="Rua A, 10, Centro..."></textarea>
    </div>

    <button id="btn" class="btn" onclick="gerar()">Otimizar Rota</button>

    <div id="status"></div>
</div>

<script>
    async function gerar() {
        const key = document.getElementById('apiKey').value;
        const list = document.getElementById('enderecos').value;
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        if (!key || !list) return alert("Preencha tudo!");

        btn.disabled = true;
        status.style.display = 'block';
        status.className = 'loading';
        status.innerHTML = "Processando... Isso pode levar até 30 segundos.";

        try {
            // Chamamos nossa própria API no Vercel para evitar o erro de CORS
            const response = await fetch('/api/roteirizar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, list })
            });

            const data = await response.json();

            if (data.success) {
                status.className = 'success';
                status.innerHTML = "<strong>Rota Otimizada:</strong><br><pre>" + data.result + "</pre>";
            } else {
                status.className = 'error';
                status.innerHTML = "Erro: " + data.error;
            }
        } catch (err) {
            status.className = 'error';
            status.innerHTML = "Erro na conexão. Verifique se o Vercel está configurado.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
