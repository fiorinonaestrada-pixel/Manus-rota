<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteirizador Inteligente - Pedro</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        textarea { height: 200px; resize: vertical; font-family: monospace; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #1d4ed8; }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        #status { margin-top: 25px; padding: 20px; border-radius: 6px; display: none; }
        .loading { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
        .success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        #resultadoFinal { margin-top: 20px; white-space: pre-wrap; background: #f1f5f9; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Roteirizador Logístico</h1>
    
    <div class="form-group">
        <label for="apiKey">API Key do Manus:</label>
        <input type="password" id="apiKey" placeholder="Cole sua chave sk-8-...">
    </div>

    <div class="form-group">
        <label for="enderecos">Endereços para Entrega (um por linha):</label>
        <textarea id="enderecos" placeholder="Rua Exemplo, 123, Bairro, Cidade - Estado"></textarea>
    </div>

    <button id="btnGerar" class="btn" onclick="processar()">Otimizar Rota</button>

    <div id="status"></div>
    <div id="resultadoFinal"></div>
</div>

<script>
    let taskId = null;
    let pollingInterval = null;

    async function processar() {
        const apiKey = document.getElementById('apiKey').value;
        const enderecos = document.getElementById('enderecos').value;
        const btn = document.getElementById('btnGerar');
        const statusDiv = document.getElementById('status');
        const resFinal = document.getElementById('resultadoFinal');

        if (!apiKey || !enderecos) {
            alert("Preencha a API Key e os endereços.");
            return;
        }

        btn.disabled = true;
        resFinal.style.display = 'none';
        statusDiv.style.display = 'block';
        statusDiv.className = 'loading';
        statusDiv.innerHTML = "<strong>Iniciando...</strong><br>Enviando lista para o Manus.";

        try {
            // 1. Criar a tarefa
            const response = await fetch('https://api.manus.ai/v2/task.create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-manus-api-key': apiKey },
                body: JSON.stringify({
                    message: { content: `Organize estes endereços na melhor sequência de entrega (menor distância): \n\n${enderecos}` }
                })
            });

            const data = await response.json();
            if (!data.ok) throw new Error(data.error.message);

            taskId = data.data.task_id;
            statusDiv.innerHTML = "<strong>Tarefa Criada!</strong><br>O Manus está calculando a melhor rota agora. Aguarde...";

            // 2. Iniciar Polling para pegar o resultado
            pollingInterval = setInterval(() => verificarStatus(apiKey), 5000);

        } catch (error) {
            statusDiv.className = 'error';
            statusDiv.innerHTML = "<strong>Erro:</strong> " + error.message;
            btn.disabled = false;
        }
    }

    async function verificarStatus(apiKey) {
        const statusDiv = document.getElementById('status');
        const resFinal = document.getElementById('resultadoFinal');
        const btn = document.getElementById('btnGerar');

        try {
            const response = await fetch(`https://api.manus.ai/v2/task.listMessages?task_id=${taskId}`, {
                headers: { 'x-manus-api-key': apiKey }
            });
            const data = await response.json();

            if (data.ok) {
                // Procurar por mensagens do assistente (Manus) que contenham o resultado
                const ultimaMensagem = data.data.messages.reverse().find(m => m.role === 'assistant');
                
                // Verificar se a tarefa terminou (simplificado: se houver resposta do assistente)
                if (ultimaMensagem) {
                    clearInterval(pollingInterval);
                    statusDiv.className = 'success';
                    statusDiv.innerHTML = "<strong>Rota Otimizada com Sucesso!</strong>";
                    resFinal.style.display = 'block';
                    resFinal.innerText = ultimaMensagem.content;
                    btn.disabled = false;
                }
            }
        } catch (e) {
            console.error("Erro ao verificar status:", e);
        }
    }
</script>

</body>
</html>
